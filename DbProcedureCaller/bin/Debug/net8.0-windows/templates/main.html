<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析系统 - 配置中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        .page-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .page-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            padding: 1.5rem 2.5rem; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(96, 165, 250, 0.15); flex-shrink: 0;
        }
        .page-header h1 { color: #f8fafc; font-weight: 800; font-size: 1.6rem; display: flex; align-items: center; gap: 12px; }
        .page-header h1 i { color: #3b82f6; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .header-right button { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .header-right button:hover { background: rgba(239, 68, 68, 0.25); }
        .main-content { flex: 1; display: flex; background: #0f172a; overflow: hidden; }
        .menu-sidebar { width: 260px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-right: 1px solid rgba(96, 165, 250, 0.1); padding: 20px 0; overflow-y: auto; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
        .menu-item:hover { background: rgba(59, 130, 246, 0.1); color: #f8fafc; }
        .menu-item.active { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-left: 3px solid #3b82f6; }
        .menu-item i { font-size: 1.25rem; }
        .menu-item span { font-weight: 500; }
        .content-area { flex: 1; overflow: hidden; }
        .content-area iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1><i class="fa-solid fa-chart-line"></i> 统计分析系统</h1>
            <div class="header-right">
                <span style="color: #94a3b8;">欢迎, <span id="currentUser">管理员</span></span>
                <button onclick="logout()">退出登录</button>
            </div>
        </div>
        <div class="main-content">
            <div class="menu-sidebar">
                <div class="menu-item active" onclick="navigateTo('daily-analysis')">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>每日分析</span>
                </div>
                <div class="menu-item" onclick="navigateTo('server-config')">
                    <i class="fa-solid fa-server"></i>
                    <span>服务器配置</span>
                </div>
                <div class="menu-item" onclick="navigateTo('user-config')">
                    <i class="fa-solid fa-users"></i>
                    <span>用户管理</span>
                </div>
                <div class="menu-item" onclick="navigateTo('permission-config')">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>权限配置</span>
                </div>
                <div class="menu-item" onclick="navigateTo('param-config')">
                    <i class="fa-solid fa-sliders"></i>
                    <span>参数配置</span>
                </div>
                <div class="menu-item" onclick="navigateTo('complex-config')">
                    <i class="fa-solid fa-cog"></i>
                    <span>综合配置</span>
                </div>
            </div>
            <div class="content-area">
                <iframe id="contentFrame" src="daily-analysis.html"></iframe>
            </div>
        </div>
    </div>
    <script>
        function navigateTo(page) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.menu-item').classList.add('active');
            document.getElementById('contentFrame').src = page + '.html';
        }
        function logout() {
            sessionStorage.removeItem('user');
            window.location.href = '/';
        }
        document.getElementById('currentUser').textContent = sessionStorage.getItem('user') || '管理员';
    </script>
</body>
</html>
