<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日分析 - 统计分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0f172a; }
        .page-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .page-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            padding: 1rem 1.5rem; display: flex; align-items: center; gap: 20px;
            border-bottom: 1px solid rgba(96, 165, 250, 0.15); flex-shrink: 0;
            position: relative;
        }
        .page-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer { 0%,100% { background-position: 200% 0; } 50% { background-position: -200% 0; } }
        .btn-back {
            display: flex; align-items: center; gap: 8px;
            background: rgba(96, 165, 250, 0.15); border: 1px solid rgba(96, 165, 250, 0.3);
            color: #60a5fa; border-radius: 10px; padding: 10px 18px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-back:hover { background: rgba(96, 165, 250, 0.25); border-color: rgba(96, 165, 250, 0.5); transform: translateY(-1px); }
        .page-header h2 { color: #f8fafc; margin: 0; font-weight: 700; font-size: 1.4rem; }
        .page-header h2 i { color: #3b82f6; margin-right: 10px; }
        .page-content { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .panel-card { 
            background: linear-gradient(145deg, #1e293b, #263348); 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.06); 
            padding: 1.5rem; 
            margin-bottom: 1.5rem; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .panel-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .panel-card .card-title { display: flex; align-items: center; gap: 10px; color: #f8fafc; font-weight: 700; margin-bottom: 1.2rem; font-size: 1.1rem; }
        .panel-card .card-title i { color: #3b82f6; }
        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 1rem; }
        .filter-group { position: relative; }
        .filter-group label { color: #94a3b8; font-size: 12px; font-weight: 600; margin-bottom: 6px; display: block; }
        .filter-group select, .filter-group input { 
            width: 100%; height: 42px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15,23,42,0.8); color: #f1f5f9; padding: 0 14px; font-size: 14px; 
            outline: none; transition: all 0.3s;
        }
        .filter-group select:focus, .filter-group input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .filter-actions { display: flex; gap: 12px; align-items: flex-end; }
        .btn-query { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
            border: none; border-radius: 12px; padding: 0 24px; height: 42px; 
            color: white; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-query:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
        .btn-export { 
            background: rgba(34,197,94,0.15); 
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 12px; padding: 0 24px; height: 42px; 
            color: #4ade80; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-export:hover { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.5); }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 1.5rem; }
        .stat-box { 
            background: linear-gradient(145deg, rgba(30,41,59,0.8), rgba(38,51,72,0.8)); 
            border-radius: 16px; 
            padding: 1.5rem; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
        }
        .stat-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            border-radius: 16px 16px 0 0;
        }
        .stat-positive::before { background: linear-gradient(90deg, #ef4444, #f87171); }
        .stat-negative::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .stat-total::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .stat-rate::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .stat-box .value { font-size: 2.2rem; font-weight: 800; color: #f8fafc; margin-bottom: 4px; }
        .stat-box .label { font-size: 12px; color: #64748b; }
        .stat-positive .value { color: #f87171; }
        .stat-negative .value { color: #4ade80; }
        .stat-rate .value { color: #fbbf24; }
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th { 
            background: rgba(15,23,42,0.9); 
            color: #94a3b8; 
            font-weight: 600; 
            padding: 14px 16px; 
            text-align: left; 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-table td { 
            padding: 14px 16px; 
            color: #cbd5e1; 
            font-size: 14px; 
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .result-table tbody tr:hover { background: rgba(59,130,246,0.08); }
        .result-table tbody tr:last-child td { border-bottom: none; }
        .result-status { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-positive { background: rgba(239,68,68,0.2); color: #f87171; }
        .status-negative { background: rgba(34,197,94,0.2); color: #4ade80; }
        .chart-area { height: 320px; margin-top: 1rem; }
        .loading-spinner { display: flex; align-items: center; justify-content: center; gap: 10px; color: #60a5fa; }
        .loading-spinner i { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .empty-state { color: #64748b; text-align: center; padding: 3rem; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <button class="btn-back" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> 返回</button>
            <h2><i class="fa-solid fa-chart-bar"></i>检查每日分析</h2>
        </div>
        <div class="page-content">
            <div class="panel-card">
                <div class="card-title"><i class="fa-solid fa-filter"></i>查询条件</div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label>开始日期</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="filter-group">
                        <label>结束日期</label>
                        <input type="date" id="endDate">
                    </div>
                    <div class="filter-group">
                        <label>系统</label>
                        <select id="system"><option value="">全部</option></select>
                    </div>
                    <div class="filter-group">
                        <label>报告医生</label>
                        <select id="reporter"><option value="">全部</option></select>
                    </div>
                    <div class="filter-actions">
                        <button class="btn-query" onclick="runQuery()"><i class="fa-solid fa-magnifying-glass"></i>查询</button>
                        <button class="btn-export" onclick="exportData()" disabled id="btnExport"><i class="fa-solid fa-download"></i>导出</button>
                    </div>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-box stat-positive">
                    <div class="value" id="statPositive">0</div>
                    <div class="label">阳性数</div>
                </div>
                <div class="stat-box stat-negative">
                    <div class="value" id="statNegative">0</div>
                    <div class="label">阴性数</div>
                </div>
                <div class="stat-box stat-total">
                    <div class="value" id="statTotal">0</div>
                    <div class="label">总检查数</div>
                </div>
                <div class="stat-box stat-rate">
                    <div class="value" id="statRate">0.00%</div>
                    <div class="label">阳性率</div>
                </div>
            </div>
            <div class="panel-card">
                <div class="card-title"><i class="fa-solid fa-table"></i>分析结果</div>
                <div id="resultArea" class="empty-state">
                    <i class="fa-solid fa-chart-bar"></i>
                    <div>请选择查询条件后点击查询</div>
                </div>
            </div>
            <div class="panel-card">
                <div class="card-title"><i class="fa-solid fa-bar-chart"></i>数据可视化</div>
                <div class="chart-area" id="chartContainer"></div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        var chartInstance = null;
        var currentData = [];
        
        function goBack() { window.location.href = '/index'; }
        
        $(document).ready(function() {
            var today = new Date();
            var firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            $('#startDate').val(firstDay.toISOString().split('T')[0]);
            $('#endDate').val(today.toISOString().split('T')[0]);
            loadOptions();
        });
        
        function loadOptions() {
            $.get('/get-system-types', function(res) {
                var r = typeof res === 'string' ? JSON.parse(res) : res;
                if (r && r.success) {
                    var html = '<option value="">全部</option>';
                    r.data.forEach(function(s) { html += '<option value="'+s.code+'">'+s.name+'</option>'; });
                    $('#system').html(html);
                }
            });
        }
        
        function runQuery() {
            $('#resultArea').html('<div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> 查询中...</div>');
            $('#btnExport').prop('disabled', true);
            
            $.ajax({
                url: '/daily-analysis',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    startDate: $('#startDate').val(),
                    endDate: $('#endDate').val(),
                    system: $('#system').val(),
                    reporter: $('#reporter').val()
                }),
                success: function(res) {
                    var r = typeof res === 'string' ? JSON.parse(res) : res;
                    if (r && r.success && r.data && r.data.length > 0) {
                        currentData = r.data;
                        displayResult(r.data);
                        $('#btnExport').prop('disabled', false);
                    } else {
                        $('#resultArea').html('<div class="empty-state"><i class="fa-solid fa-inbox"></i><div>没有查询到数据</div></div>');
                        resetStats();
                    }
                },
                error: function() {
                    $('#resultArea').html('<div class="empty-state" style="color:#f87171;"><i class="fa-solid fa-exclamation-triangle"></i><div>查询失败，请稍后重试</div></div>');
                    resetStats();
                }
            });
        }
        
        function resetStats() {
            $('#statPositive').text('0');
            $('#statNegative').text('0');
            $('#statTotal').text('0');
            $('#statRate').text('0.00%');
            currentData = [];
            $('#btnExport').prop('disabled', true);
        }
        
        function displayResult(data) {
            var cols = Object.keys(data[0]);
            var html = '<table class="result-table"><thead><tr>';
            cols.forEach(function(c) { html += '<th>'+c+'</th>'; });
            html += '</tr></thead><tbody>';
            data.forEach(function(row) {
                html += '<tr>';
                cols.forEach(function(c) {
                    var val = row[c] || '';
                    if (c === '阳性率') {
                        var rate = parseFloat(val) || 0;
                        var cls = rate >= 50 ? 'status-positive' : 'status-negative';
                        html += '<td><span class="result-status '+cls+'">'+rate.toFixed(2)+'%</span></td>';
                    } else {
                        html += '<td>'+val+'</td>';
                    }
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            $('#resultArea').html(html);
            
            var total = 0, positive = 0, negative = 0;
            data.forEach(function(row) {
                total += parseInt(row['任务数量']) || 0;
                positive += parseInt(row['阳性数量']) || 0;
                negative += parseInt(row['阴性数量']) || 0;
            });
            var rate = total > 0 ? (positive / total * 100) : 0;
            $('#statPositive').text(positive.toLocaleString());
            $('#statNegative').text(negative.toLocaleString());
            $('#statTotal').text(total.toLocaleString());
            $('#statRate').text(rate.toFixed(2) + '%');
            
            renderChart(data);
        }
        
        function renderChart(data) {
            if (!chartInstance) {
                chartInstance = echarts.init(document.getElementById('chartContainer'));
            }
            var systemData = {};
            data.forEach(function(row) {
                var sys = row['系统'] || '未知';
                if (!systemData[sys]) systemData[sys] = {positive: 0, negative: 0, total: 0};
                systemData[sys].positive += parseInt(row['阳性数量']) || 0;
                systemData[sys].negative += parseInt(row['阴性数量']) || 0;
                systemData[sys].total += parseInt(row['任务数量']) || 0;
            });
            var systems = Object.keys(systemData);
            var positiveData = systems.map(function(s) { return systemData[s].positive; });
            var negativeData = systems.map(function(s) { return systemData[s].negative; });
            
            chartInstance.setOption({
                backgroundColor: 'transparent',
                title: { text: '各系统检查统计', left: 'center', textStyle: { color: '#f8fafc', fontSize: 14, fontWeight: 600 } },
                tooltip: { 
                    trigger: 'axis',
                    backgroundColor: 'rgba(30,41,59,0.95)',
                    borderColor: 'rgba(255,255,255,0.1)',
                    textStyle: { color: '#f1f5f9' }
                },
                legend: { data: ['阳性', '阴性'], bottom: 0, textStyle: { color: '#94a3b8' } },
                grid: { left: '3%', right: '4%', bottom: '18%', top: '12%', containLabel: true },
                xAxis: { 
                    type: 'category', 
                    data: systems, 
                    axisLabel: { color: '#94a3b8', rotate: systems.length > 5 ? 30 : 0 },
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                yAxis: { 
                    type: 'value', 
                    axisLabel: { color: '#94a3b8' },
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }
                },
                series: [
                    { name: '阳性', type: 'bar', data: positiveData, itemStyle: { color: '#ef4444', borderRadius: [4,4,0,0] } },
                    { name: '阴性', type: 'bar', data: negativeData, itemStyle: { color: '#22c55e', borderRadius: [4,4,0,0] } }
                ]
            });
        }
        
        function exportData() {
            if (!currentData || currentData.length === 0) return;
            
            var headers = Object.keys(currentData[0]).join('\t');
            var rows = currentData.map(function(row) {
                return Object.values(row).join('\t');
            });
            var content = headers + '\n' + rows.join('\n');
            
            var blob = new Blob(['\ufeff' + content], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'daily-analysis-' + new Date().toISOString().split('T')[0] + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
