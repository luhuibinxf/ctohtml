<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复杂存储配置 - 统计分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        .page-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .page-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            padding: 1rem 1.5rem; display: flex; align-items: center; gap: 20px;
            border-bottom: 1px solid rgba(96, 165, 250, 0.15); flex-shrink: 0;
        }
        .btn-back {
            display: flex; align-items: center; gap: 8px;
            background: rgba(96, 165, 250, 0.15); border: 1px solid rgba(96, 165, 250, 0.3);
            color: #60a5fa; border-radius: 10px; padding: 8px 16px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-back:hover { background: rgba(96, 165, 250, 0.25); border-color: rgba(96, 165, 250, 0.5); }
        .page-header h2 { color: #f8fafc; margin: 0; font-weight: 700; font-size: 1.3rem; }
        .page-content { flex: 1; overflow-y: auto; padding: 2rem; display: flex; align-items: center; justify-content: center; }
        .dev-card {
            background: linear-gradient(145deg, #1e293b, #263348); border-radius: 20px; padding: 3rem 4rem;
            border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center;
        }
        .dev-icon { font-size: 4rem; margin-bottom: 1.5rem; }
        .dev-card h3 { color: #f8fafc; font-weight: 700; margin-bottom: 0.5rem; }
        .dev-card p { color: #64748b; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <button class="btn-back" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> 返回</button>
            <h2><i class="fa-solid fa-database me-2"></i>复杂存储配置</h2>
        </div>
        <div class="page-content">
            <div class="dev-card">
                <div class="dev-icon">💾</div>
                <h3>功能开发中</h3>
                <p>存储过程配置功能正在开发中...</p>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>function goBack() { window.location.href = '/index'; }</script>
</body>
</html>
