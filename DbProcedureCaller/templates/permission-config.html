<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限维护 - 统计分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        .page-container { width: 100vw; min-height: 100vh; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #1e293b 100%);
            border-radius: 16px;
            margin: 16px;
            box-shadow: 0 8px 24px rgba(30, 64, 175, 0.3);
        }
        .page-header-title {
            display: flex; align-items: center; gap: 14px;
            color: white; font-size: 19px; font-weight: 700;
        }
        .page-header-title i { font-size: 24px; }
        .page-header-right { display: flex; align-items: center; gap: 16px; }
        .btn-back {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
            border-radius: 10px; padding: 10px 18px;
            color: white; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: all 0.25s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.25); transform: translateY(-1px); }
        .page-content { flex: 1; overflow-y: auto; padding: 2rem; display: flex; align-items: center; justify-content: center; }
        .dev-card {
            background: linear-gradient(145deg, #1e293b, #263348); border-radius: 20px; padding: 3rem 4rem;
            border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center;
        }
        .dev-icon { font-size: 4rem; margin-bottom: 1.5rem; }
        .dev-card h3 { color: #f8fafc; font-weight: 700; margin-bottom: 0.5rem; }
        .dev-card p { color: #64748b; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <div class="page-header-title">
                <i class="fa-solid fa-shield-halved"></i>
                权限维护
            </div>
            <div class="page-header-right">
                <button class="btn-back" onclick="goBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                    返回主菜单
                </button>
            </div>
        </div>
        <div class="page-content">
            <div class="dev-card">
                <div class="dev-icon">🔧</div>
                <h3>功能开发中</h3>
                <p>权限配置功能正在开发中...</p>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function goBack() { 
            if (window.parent !== window) {
                window.parent.closeContent && window.parent.closeContent();
            } else {
                window.location.href = '/main';
            }
        }
    </script>
</body>
</html>
