<div class="bg-white rounded-3 p-4">
    <button class="btn btn-primary mb-4" onclick="showUserRoleAssign()">用户角色分配</button>
    <button class="btn btn-secondary mb-4 ms-2" onclick="loadRoleList()">刷新</button>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>角色名称</th>
                <th>描述</th>
                <th>权限</th>
                <th>状态</th>
            </tr>
        </thead>
        <tbody id="roleTableBody"></tbody>
    </table>
</div>

<div id="roleAssignPanel" style="display: none;">
    <button class="btn btn-secondary mb-4" onclick="loadRoleList()">返回</button>
    <div class="row">
        <div class="col-md-5">
            <h4>用户列表</h4>
            <select id="userSelect" class="form-control" size="12"></select>
        </div>
        <div class="col-md-7">
            <h4>角色列表</h4>
            <div id="roleCheckboxes"></div>
            <button class="btn btn-primary mt-4" onclick="saveUserRoles()">保存角色分配</button>
            <div id="assignResult" class="mt-3"></div>
        </div>
    </div>
</div>
