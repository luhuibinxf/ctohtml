<style>
/* ===== 用户配置页面样式 - 高端大气版 ===== */
.uc-page {

}

}
.uc-stat-card:hover {

    border-color: rgba(255,255,255,0.1);
}
.uc-stat-icon {

    height: 48px;

    align-items: center;
    justify-content: center;

.uc-stat-value { color: #f8fafc; font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.uc-stat-trend { color: #64748b; font-size: 11px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }

@keyframes ucNumberPulse {

/* 用户列表卡片 */

}
.uc-card-header {

    border-bottom: 1px solid rgba(255,255,255,0.06);

    align-items: center;
    justify-content: space-between;
}
.uc-card-title {

}

/* 搜索和筛选栏 */

.uc-user-name { color: #f8fafc; font-weight: 600; }

/* 状态徽章 */
.uc-status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;

}

}
.uc-status-active::before {

}

    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ef4444;
}

/* 角色徽章 */
.uc-role-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}
.uc-role-admin {
    background: rgba(139,92,246,0.15);
    color: #a78bfa;
    border: 1px solid rgba(139,92,246,0.2);
}
.uc-role-user {
    background: rgba(100,116,139,0.15);
    color: #94a3b8;
    border: 1px solid rgba(100,116,139,0.2);
}

/* 操作按钮 - 高端设计 */
.uc-action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: #94a3b8;

    transition: all 0.25s;

}
.uc-action-btn:hover { transform: translateY(-2px); }
.uc-action-btn.uc-btn-edit:hover {
    background: rgba(59,130,246,0.2);
    border-color: rgba(59,130,246,0.4);
    color: #60a5fa;
    box-shadow: 0 4px 12px rgba(59,130,246,0.3);
}
.uc-action-btn.uc-btn-delete:hover {
    background: rgba(239,68,68,0.2);
    border-color: rgba(239,68,68,0.4);
    color: #f87171;
    box-shadow: 0 4px 12px rgba(239,68,68,0.3);
}

/* 底部操作区 */
.uc-table-footer {
    padding: 20px 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.uc-footer-info { color: #64748b; font-size: 13px; }
.uc-footer-info span { color: #94a3b8; font-weight: 600; }

.uc-footer-pagination {
    display: flex;
    align-items: center;
    gap: 8px;
}
.uc-page-btn {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #94a3b8;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.uc-page-btn:hover:not(:disabled) {
    background: rgba(59,130,246,0.2);
    color: #3b82f6;
}
.uc-page-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.uc-page-current {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    padding: 0 8px;
}

/* 添加用户按钮 - 高端设计 */
.uc-btn-add {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    border: none;
    border-radius: 12px;
    padding: 0 24px;
    height: 44px;
    font-weight: 600;
    font-size: 14px;
    color: white;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 16px rgba(59,130,246,0.4);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
}
.uc-btn-add::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}
.uc-btn-add:hover::before { left: 100%; }
.uc-btn-add:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(59,130,246,0.5); }
.uc-btn-add:active { transform: translateY(-1px); }

/* 加载状态 */
.uc-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px;
    color: #64748b;
}
.uc-loading-spinner {
    width: 24px;
    height: 24px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: ucSpin 0.8s linear infinite;
}
@keyframes ucSpin { to { transform: rotate(360deg); } }

/* ===== 模态框样式 ===== */
.uc-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 9999;
}
.uc-modal.show {
    display: flex;
    align-items: center;
    justify-content: center;
}
.uc-modal-backdrop {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
}
.uc-modal-content {
    position: relative;
    background: #1e293b;
    border-radius: 20px;
    width: 90%;
    max-width: 520px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
    animation: ucModalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
}
@keyframes ucModalIn {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
.uc-modal-header {
    padding: 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.uc-modal-title {
    color: #f8fafc;
    font-size: 18px;
    font-weight: 700;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 10px;
}
.uc-modal-title i { color: #3b82f6; }
.uc-modal-close {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8; cursor: pointer; font-size: 16px; transition: all 0.2s;
}
.uc-modal-close:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #f87171; }
.uc-modal-body { padding: 28px; }

/* 表单样式 */
.uc-form-group { margin-bottom: 20px; }
.uc-form-label {
    display: flex; align-items: center; gap: 8px;
    color: #cbd5e1; font-weight: 600; font-size: 13px; margin-bottom: 8px;
}
.uc-form-label i { color: #64748b; font-size: 14px; }
.uc-form-control {
    width: 100%; height: 44px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.6);
    color: #f1f5f9; padding: 0 16px; font-size: 14px; transition: all 0.3s;
    box-sizing: border-box; outline: none;
}
.uc-form-control::placeholder { color: #475569; }
.uc-form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
.uc-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.uc-input-group { display: flex; align-items: center; }
.uc-input-group .uc-form-control { border-radius: 10px 0 0 10px; border-right: none; }
.uc-input-append {
    height: 44px; padding: 0 14px;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 0 10px 10px 0;
    background: rgba(15,23,42,0.6); display: flex; align-items: center;
    justify-content: center; cursor: pointer; color: #64748b; transition: all 0.2s;
}
.uc-input-append:hover { color: #3b82f6; background: rgba(59,130,246,0.1); }
.uc-form-hint { display: flex; align-items: center; gap: 6px; margin-top: 8px; color: #64748b; font-size: 12px; }

/* 模态框底部 */
.uc-modal-footer {
    padding: 20px 28px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: flex-end;
    gap: 12px;
}
.uc-btn-cancel {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 0 20px; height: 44px; font-weight: 600; font-size: 14px;
    color: #94a3b8; cursor: pointer; transition: all 0.25s; display: inline-flex; align-items: center; gap: 8px;
}
.uc-btn-cancel:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
.uc-btn-save {

    border-radius: 10px; padding: 0 24px; height: 44px; font-weight: 600; font-size: 14px;
    color: white; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 16px rgba(59,130,246,0.4);
    display: inline-flex; align-items: center; gap: 8px;
}
.uc-btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.5); }
</style>

<!-- 添加用户模态框 -->

                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="uc-form-group">
                        <label class="uc-form-label">
                            <i class="fa-solid fa-toggle-on"></i>
                            账号状态
                        </label>
                        <select class="uc-form-control" id="userStatus">
                            <option value="active">启用</option>
                            <option value="inactive">禁用</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>
        <div class="uc-modal-footer">
            <button class="uc-btn-cancel" onclick="UserConfig.hideModal()">
                <i class="fa-solid fa-arrow-left"></i>
                取消
            </button>
            <button class="uc-btn-save" onclick="UserConfig.saveUser()">
                <i class="fa-solid fa-check"></i>
                确认保存
            </button>
        </div>
    </div>
</div>
