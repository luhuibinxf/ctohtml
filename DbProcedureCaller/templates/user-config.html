<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户配置 - 统计分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        .page-container { width: 100%; height: 100%; display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px;
            height: 42px;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #1e293b 100%);
            border-radius: 10px;
            margin: 12px;
            box-shadow: 0 3px 12px rgba(30, 64, 175, 0.2);
        }
        .page-header-title {
            display: flex; align-items: center; gap: 8px;
            color: white; font-size: 13px; font-weight: 600;
        }
        .page-header-title i { font-size: 14px; }
        .page-header-right { display: flex; align-items: center; gap: 10px; }
        .btn-back {
            display: flex; align-items: center; gap: 4px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; padding: 5px 10px;
            color: white; font-weight: 500; font-size: 11px;
            cursor: pointer; transition: all 0.25s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .page-content { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .toolbar { display: flex; gap: 16px; margin-bottom: 1.5rem; align-items: center; }
        .search-box { flex: 1; position: relative; max-width: 400px; }
        .search-box input { 
            width: 100%; height: 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15,23,42,0.8); color: #f1f5f9; padding: 0 16px 0 44px; font-size: 14px; 
            outline: none; transition: all 0.3s;
        }
        .search-box input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
        .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #64748b; }
        .toolbar-actions { display: flex; gap: 12px; }
        .btn-add { 
            background: linear-gradient(135deg, #8b5cf6, #6366f1); 
            border: none; border-radius: 12px; padding: 0 24px; height: 44px; 
            color: white; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,92,246,0.4); }
        .btn-batch { 
            background: rgba(251,191,36,0.15); 
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 12px; padding: 0 24px; height: 44px; 
            color: #fbbf24; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-batch.active { opacity: 1; pointer-events: auto; }
        .btn-batch:hover { background: rgba(251,191,36,0.25); border-color: rgba(251,191,36,0.5); }
        .user-table-container { 
            background: linear-gradient(145deg, #1e293b, #263348); 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .table-header { padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
        .table-header .select-all { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 13px; cursor: pointer; }
        .table-header .select-all input { width: 18px; height: 18px; accent-color: #8b5cf6; }
        .table-header .count-info { color: #64748b; font-size: 13px; }
        .user-table { width: 100%; border-collapse: collapse; }
        .user-table th { 
            background: rgba(15,23,42,0.9); 
            color: #94a3b8; 
            font-weight: 600; 
            padding: 14px 16px; 
            text-align: left; 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .user-table td { 
            padding: 14px 16px; 
            color: #cbd5e1; 
            font-size: 14px; 
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .user-table tbody tr:hover { background: rgba(139,92,246,0.06); }
        .user-table tbody tr.selected { background: rgba(139,92,246,0.12); }
        .user-table .checkbox-cell { width: 50px; }
        .user-table .checkbox-cell input { width: 18px; height: 18px; accent-color: #8b5cf6; }
        .user-info { display: flex; align-items: center; gap: 14px; }
        .user-avatar { 
            width: 42px; 
            height: 42px; 
            border-radius: 12px; 
            background: linear-gradient(135deg, #8b5cf6, #3b82f6); 
            display: flex; align-items: center; justify-content: center; 
            color: white; 
            font-weight: 700;
            font-size: 14px;
        }
        .user-detail { display: flex; flex-direction: column; }
        .user-detail .username { color: #f8fafc; font-weight: 600; }
        .user-detail .user-id { color: #64748b; font-size: 12px; }
        .role-badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .role-admin { background: rgba(139,92,246,0.2); color: #a78bfa; }
        .role-user { background: rgba(100,116,139,0.2); color: #94a3b8; }
        .status-switch { 
            position: relative; 
            width: 48px; 
            height: 26px; 
            background: rgba(239,68,68,0.2); 
            border-radius: 13px; 
            cursor: pointer;
            transition: background 0.3s;
        }
        .status-switch.active { background: rgba(34,197,94,0.2); }
        .status-switch::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 20px; height: 20px;
            background: #f87171;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .status-switch.active::after {
            left: 25px;
            background: #4ade80;
        }
        .action-btns { display: flex; gap: 8px; justify-content: center; }
        .action-btn { 
            display: inline-flex; align-items: center; justify-content: center; 
            width: 36px; height: 36px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.08); 
            background: transparent; 
            color: #94a3b8; 
            cursor: pointer; 
            margin: 0 2px; 
            transition: all 0.2s;
        }
        .action-btn:hover { transform: translateY(-2px); }
        .action-btn.edit:hover { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.4); color: #60a5fa; }
        .action-btn.delete:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #f87171; }
        .action-btn.lock:hover { background: rgba(251,191,36,0.2); border-color: rgba(251,191,36,0.4); color: #fbbf24; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-backdrop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }
        .modal-content { 
            position: relative; 
            background: #ffffff; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 500px; 
            border: 1px solid #d1d5db; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.18);
            animation: modalIn 0.3s;
            overflow: hidden;
            z-index: 10000;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { 
            padding: 20px 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid #e2e8f0;
            background: linear-gradient(135deg, rgba(139,92,246,0.05), transparent);
        }
        .modal-header h5 { color: #1e293b; margin: 0; font-weight: 700; font-size: 1.1rem; }
        .modal-close { 
            width: 34px; 
            height: 34px; 
            border-radius: 10px; 
            background: #f1f5f9; 
            border: none; 
            color: #64748b; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(239,68,68,0.2); color: #f87171; }
        .modal-body { padding: 24px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; color: #475569; font-weight: 600; font-size: 13px; margin-bottom: 8px; }
        .form-control { 
            width: 100%; 
            height: 44px; 
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            background: #f8fafc; 
            color: #1e293b; 
            padding: 0 14px; 
            font-size: 14px; 
            outline: none;
            transition: all 0.3s;
        }
        .form-control:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-hint { color: #64748b; font-size: 12px; margin-top: 6px; }
        .modal-footer { 
            padding: 16px 24px; 
            display: flex; 
            justify-content: flex-end; 
            gap: 12px; 
            border-top: 1px solid #e2e8f0;
        }
        .btn-cancel { 
            background: #f1f5f9; 
            border: 1px solid #e2e8f0; 
            border-radius: 10px; 
            padding: 0 20px; 
            height: 40px; 
            color: #94a3b8; 
            font-weight: 600; 
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-save { 
            background: linear-gradient(135deg, #8b5cf6, #6366f1); 
            border: none; 
            border-radius: 10px; 
            padding: 0 24px; 
            height: 40px; 
            color: white; 
            font-weight: 600; 
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139,92,246,0.3); }
        .empty-state { color: #64748b; text-align: center; padding: 4rem; }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(30,41,59,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f1f5f9;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 10000;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success i { color: #4ade80; }
        .toast.error i { color: #f87171; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <div class="page-header-title">
                <i class="fa-solid fa-users"></i>
                用户配置和维护
            </div>
            <div class="page-header-right">
                <button class="btn-back" onclick="goBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                    返回主菜单
                </button>
            </div>
        </div>
        <div class="page-content">
            <div class="toolbar">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="搜索用户..." id="userSearch" oninput="filterUsers()">
                </div>
                <div class="toolbar-actions">
                    <button class="btn-add" onclick="showAddModal()"><i class="fa-solid fa-plus"></i>添加用户</button>
                    <button class="btn-batch" id="btnBatchDelete" onclick="batchDelete()"><i class="fa-solid fa-trash"></i>批量删除</button>
                </div>
            </div>
            <div class="user-table-container">
                <div class="table-header">
                    <label class="select-all"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()">全选</label>
                    <div class="count-info">共 <span id="userCount">0</span> 个用户</div>
                </div>
                <table class="user-table">
                    <thead>
                        <tr>
                            <th class="checkbox-cell"></th>
                            <th>用户信息</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th style="text-align:center;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="5" style="text-align:center;padding:40px;color:#64748b;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="userModal" class="modal">
        <div class="modal-backdrop" onclick="hideModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h5 id="modalTitle"><i class="fa-solid fa-user-plus"></i>添加用户</h5>
                <button class="modal-close" onclick="hideModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">用户ID</label>
                    <input type="text" class="form-control" id="userId" placeholder="自动生成或手动输入">
                </div>
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="userUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="userPassword" placeholder="请输入密码">
                    <div class="form-hint" id="passwordHint">添加用户时密码不能为空</div>
                </div>
                <div class="form-group">
                    <label class="form-label">外部ID（Token验证）</label>
                    <input type="text" class="form-control" id="userExternalId" placeholder="三方系统用户标识，用于Token登录验证">
                    <div class="form-hint">用于与外部系统对接，支持Token自动登录验证</div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">角色</label>
                        <select class="form-control" id="userRole">
                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select class="form-control" id="userStatus">
                            <option value="active">启用</option>
                            <option value="inactive">禁用</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="hideModal()">取消</button>
                <button class="btn-save" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"><i class="fa-solid fa-check-circle"></i><span>操作成功</span></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        var allUsers = [];
        var selectedIds = [];
        
        function goBack() { 
            if (window.parent !== window) {
                window.parent.closeContent && window.parent.closeContent();
            } else {
                window.location.href = '/main';
            }
        }
        
        $(document).ready(function() { loadUsers(); });
        
        function loadUsers() {
            $.get('/get-users', function(res) {
                var r = typeof res === 'string' ? JSON.parse(res) : res;
                if (r && r.success) {
                    allUsers = r.data.filter(function(u) { return u.username !== 'lhbdb'; });
                    renderUsers(allUsers);
                    $('#userCount').text(allUsers.length);
                }
            });
        }
        
        function renderUsers(users) {
            var html = '';
            users.forEach(function(u) {
                var initial = u.username ? u.username.charAt(0).toUpperCase() : 'U';
                var roleClass = u.role === '管理员' || u.role === 'admin' ? 'role-admin' : 'role-user';
                var roleText = u.role === '管理员' || u.role === 'admin' ? '管理员' : '普通用户';
                var statusClass = u.status === '启用' || u.status === 'active' ? 'active' : '';
                var isSelected = selectedIds.includes(u.id);
                
                html += '<tr' + (isSelected ? ' class="selected"' : '') + '>' +
                    '<td class="checkbox-cell"><input type="checkbox" ' + (isSelected ? 'checked' : '') + ' onclick="toggleSelect('+u.id+')"></td>' +
                    '<td><div class="user-info"><div class="user-avatar">'+initial+'</div><div class="user-detail"><div class="username">'+u.username+'</div><div class="user-id">ID: '+u.id+'</div></div></div></td>' +
                    '<td><span class="role-badge '+roleClass+'">'+roleText+'</span></td>' +
                    '<td><div class="status-switch '+statusClass+'" onclick="toggleStatus('+u.id+',\''+(statusClass ? 'active' : 'inactive')+'\')"></div></td>' +
                    '<td>' +
                    '<div class="action-btns">' +
                    '<button class="action-btn edit" onclick="editUser('+u.id+',\''+u.username+'\',\''+(u.externalId||'')+'\',\''+u.role+'\',\''+u.status+'\')" title="编辑"><i class="fa-solid fa-pen"></i></button>' +
                    '<button class="action-btn delete" onclick="deleteUser('+u.id+',\''+u.username+'\')" title="删除"><i class="fa-solid fa-trash"></i></button>' +
                    '</div>' +
                    '</td></tr>';
            });
            if (!html) html = '<tr><td colspan="5" class="empty-state"><i class="fa-solid fa-users"></i><div>没有用户数据</div></td></tr>';
            $('#userTableBody').html(html);
            updateBatchButton();
        }
        
        function filterUsers() {
            var keyword = $('#userSearch').val().toLowerCase();
            var filtered = allUsers.filter(function(u) { 
                return u.username.toLowerCase().indexOf(keyword) >= 0; 
            });
            renderUsers(filtered);
        }
        
        function toggleSelectAll() {
            var isChecked = $('#selectAll').prop('checked');
            if (isChecked) {
                selectedIds = allUsers.map(function(u) { return u.id; });
            } else {
                selectedIds = [];
            }
            renderUsers(allUsers);
        }
        
        function toggleSelect(id) {
            var index = selectedIds.indexOf(id);
            if (index >= 0) {
                selectedIds.splice(index, 1);
            } else {
                selectedIds.push(id);
            }
            $('#selectAll').prop('checked', selectedIds.length === allUsers.length);
            updateBatchButton();
        }
        
        function updateBatchButton() {
            var btn = $('#btnBatchDelete');
            if (selectedIds.length > 0) {
                btn.addClass('active');
                btn.html('<i class="fa-solid fa-trash"></i>批量删除 ('+selectedIds.length+')');
            } else {
                btn.removeClass('active');
                btn.html('<i class="fa-solid fa-trash"></i>批量删除');
            }
        }
        
        function showAddModal() { 
            $('#modalTitle').html('<i class="fa-solid fa-user-plus"></i>添加用户'); 
            $('#userId').val(''); 
            $('#userUsername').val(''); 
            $('#userPassword').val('').prop('required', true); 
            $('#userExternalId').val('');
            $('#userRole').val('user'); 
            $('#userStatus').val('active'); 
            $('#passwordHint').text('添加用户时密码不能为空');
            $('#userModal').addClass('show'); 
        }
        
        function editUser(id, username, externalId, role, status) { 
            $('#modalTitle').html('<i class="fa-solid fa-pen"></i>编辑用户'); 
            $('#userId').val(id); 
            $('#userUsername').val(username); 
            $('#userPassword').val('').prop('required', false); 
            $('#userExternalId').val(externalId || '');
            $('#userRole').val(role === '管理员' || role === 'admin' ? 'admin' : 'user'); 
            $('#userStatus').val(status === '启用' || status === 'active' ? 'active' : 'inactive'); 
            $('#passwordHint').text('留空则不修改密码');
            $('#userModal').addClass('show'); 
        }
        
        function hideModal() { $('#userModal').removeClass('show'); }
        
        function saveUser() {
            var id = $('#userId').val();
            var username = $('#userUsername').val();
            var password = $('#userPassword').val();
            var externalId = $('#userExternalId').val();
            var role = $('#userRole').val();
            var status = $('#userStatus').val();
            
            if (!username) { showToast('请输入用户名', 'error'); return; }
            if (!id && !password) { showToast('添加用户时密码不能为空', 'error'); return; }
            
            var url = id ? '/update-user?id='+id : '/add-user';
            var data = { 
                id: id||0, 
                username: username, 
                password: password, 
                externalId: externalId,
                role: role === 'admin' ? '管理员' : '普通用户', 
                status: status === 'active' ? '启用' : '禁用' 
            };
            
            $.ajax({ 
                url: url, 
                type: 'POST', 
                contentType: 'application/json', 
                data: JSON.stringify(data), 
                success: function(r) { 
                    var resp = typeof r === 'string' ? JSON.parse(r) : r; 
                    if (resp && resp.success) { 
                        hideModal(); 
                        loadUsers();
                        showToast(id ? '用户更新成功' : '用户添加成功', 'success');
                    } else { 
                        showToast('操作失败', 'error'); 
                    } 
                },
                error: function() {
                    showToast('操作失败', 'error');
                }
            }); 
        }
        
        function deleteUser(id, username) { 
            if (confirm('确定要删除用户 '+username+' 吗？')) { 
                $.ajax({ 
                    url: '/delete-user?id='+id, 
                    type: 'POST', 
                    contentType: 'application/json', 
                    data: JSON.stringify({id: id}), 
                    success: function(r) { 
                        var resp = typeof r === 'string' ? JSON.parse(r) : r; 
                        if (resp && resp.success) {
                            loadUsers();
                            showToast('用户删除成功', 'success');
                        } else { 
                            showToast('删除失败', 'error'); 
                        } 
                    },
                    error: function() {
                        showToast('删除失败', 'error');
                    }
                }); 
            } 
        }
        
        function batchDelete() {
            if (selectedIds.length === 0) return;
            if (confirm('确定要删除选中的 '+selectedIds.length+' 个用户吗？')) {
                $.ajax({
                    url: '/batch-delete-users',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ids: selectedIds}),
                    success: function(r) {
                        var resp = typeof r === 'string' ? JSON.parse(r) : r;
                        if (resp && resp.success) {
                            selectedIds = [];
                            $('#selectAll').prop('checked', false);
                            loadUsers();
                            showToast('批量删除成功', 'success');
                        } else {
                            showToast('批量删除失败', 'error');
                        }
                    },
                    error: function() {
                        showToast('批量删除失败', 'error');
                    }
                });
            }
        }
        
        function toggleStatus(id, currentStatus) {
            var newStatus = currentStatus === 'active' ? '禁用' : '启用';
            $.ajax({
                url: '/update-user-status?id='+id+'&status='+newStatus,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({id: id, status: newStatus}),
                success: function(r) {
                    var resp = typeof r === 'string' ? JSON.parse(r) : r;
                    if (resp && resp.success) {
                        loadUsers();
                        showToast('状态已更新', 'success');
                    } else {
                        showToast('更新失败', 'error');
                    }
                },
                error: function() {
                    showToast('更新失败', 'error');
                }
            });
        }
        
        function showToast(message, type) {
            var toast = $('#toast');
            toast.find('span').text(message);
            toast.removeClass('success error').addClass(type);
            toast.find('i').attr('class', 'fa-solid ' + (type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'));
            toast.addClass('show');
            setTimeout(function() { toast.removeClass('show'); }, 3000);
        }
    </script>
</body>
</html>
